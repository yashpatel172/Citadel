<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Book</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- ===================================== HEADER ===================================== -->
    <nav>
        <div class="logo"><h2>Hello, XXX!</h2></div>

        <ul class="links-addBook" id="links-list">
            <li><a href="searchBooks.html">Search Books</a></li>
            <li><a href="myProfile.html">My Books</a></li>
            <li class="logout-header"><a href="#">Logout</a></li>
        </ul>

        <!-- Responsive Burger -->
        <div id="burger" onclick="burgerFunction()">
            <div class="bar1"></div>
            <div class="bar2"></div>
            <div class="bar3"></div>
        </div>
    </nav>

    <!-- ===================================== ADD BOOK FORM ===================================== -->
    <form action="#" method="post" class="addBook-form">
        <!-- Form Title -->
        <h2>Add Book</h2>
        
        <div class="box">
            <div class="left-side">
                <!-- Form Input (BookTitle) -->
                <div class="input-box">            
                    <input type="text" placeholder="Book Title" autocomplete="off" required />
                    <label>Required.</label>
                </div>
                
                <!-- Form Input (PublishDate) -->
                <div class="input-box">            
                    <input type="text" placeholder="Publish Date" onfocus="(this.type='date')">
                    <label>Required.</label>
                </div>
                
                <!-- Form Input (PageCount) -->
                <div class="input-box">
                    <input type="number" placeholder="Page Count" autocomplete="off" required />
                    <label>Required. Digits only.</label>
                </div>
                
                <!-- Form Input (ISBN) -->
                <div class="input-box">            
                    <input type="number" placeholder="ISBN" autocomplete="off" required />
                    <label>Required. Digits only.</label>
                </div>

                <!-- Form Input (AddBookButton) -->
                <input type="submit" value="Add Book" class="addBook-button addBook-addbutton" />
                <input type="submit" value="Cancel" onclick="window.history.go(-1); return false;" class="addBook-button" />
            </div>
        
            <div class="right-side">
                <!-- Form Input (BookSummary) -->     
                <div class="input-box">       
                    <textarea placeholder="Book Summary" required></textarea>
                    <label>Required. MAX of 500 characters.</label>
                </div>
            </div>
        </div>
    </form>

    <!-- ===================================== SCRIPTS ===================================== -->
    <!-- Javascript header animations -->
    <script src="Javascript/nav-animations.js"></script>
</body>
</html>
