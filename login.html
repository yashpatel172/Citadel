<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- ===================================== HEADER ===================================== -->
    <nav>
        <div class="logo"><h2>Citadel</h2></div>
        <ul class="links" id="links-list">
            <li><a href="index.html">Home</a></li>
            <li><a href="signup.html">Sign Up</a></li>
        </ul>

        <!-- Responsive Burger -->
        <div id="burger" onclick="burgerFunction()">
            <div class="bar1"></div>
            <div class="bar2"></div>
            <div class="bar3"></div>
        </div>
    </nav>

    <!-- ===================================== LOGIN FORM ===================================== -->
    <form action="#" method="post" class="login-form" id="login_form">
        <!-- Form Title -->
        <h2>Welcome Back</h2>

        <!-- Form Signup Link -->
        <p>Not registered yet? <a href="signup.html">Sign up</a></p>
        
        <!-- Form Input (Email) -->
        <div class="input-box">            
            <input type="email" id="email_field" placeholder="Email" autocomplete="off" required />
        </div>
        
        <!-- Form Input (Password) -->
        <div class="input-box">
            <input type="password" id="password_field" placeholder="Password" autocomplete="off" required />
        </div>
        
        <!-- Form Input (LoginButton) -->
        <input type="submit" value="Login" class="login-button" />

        <p id="label_error"></p>
        
        <!-- Form Forgot Password Link -->
        <p class="extra-space">Forgot your password? <a href="#">Get help</a></p>
    </form>
    
    <!-- ===================================== SCRIPTS ===================================== -->
    <!-- Javascript header animations -->
    <script src="Javascript/nav-animations.js"></script>
</body>
</html>
