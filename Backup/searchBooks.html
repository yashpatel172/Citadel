<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Books</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- ===================================== HEADER ===================================== -->
    <nav>
        <div class="logo"><h2>Hello, XXX!</h2></div>

        <ul class="links-searchBooks" id="links-list">
            <li><a href="addBook.html">Add Book</a></li>
            <li><a href="myProfile.html">My Books</a></li>
            <li class="logout-header"><a href="#">Logout</a></li>
        </ul>

        <!-- Responsive Burger -->
        <div id="burger" onclick="burgerFunction()">
            <div class="bar1"></div>
            <div class="bar2"></div>
            <div class="bar3"></div>
        </div>
    </nav>

    <!-- ===================================== SEARCHED BOOKS TABLE ===================================== -->
    <form action="#" method="post" class="searchBooks-form">
        <!-- Form Title -->
        <h2>Search Book's</h2>
        
        <div class="box">
            <div class="left-side">
                <!-- Form Input (BookTitle) -->
                <div class="input-box">            
                    <input type="text" placeholder="Book Title" autocomplete="off" required />
                    <label>Required.</label>
                </div>
                
                <!-- Form Input (PublishDate) -->
                <div class="input-box">            
                    <input type="text" placeholder="Publish Date" onfocus="(this.type='date')">
                    <label>Required.</label>
                </div>

                <!-- Form Input (AddBookButton) -->
                <input type="submit" value="Search" class="addBook-button addBook-addbutton" />
            </div>
        
            <div class="right-side">
                <!-- Form Input (AuthorName) -->
                <div class="input-box">
                    <input type="text" placeholder="Author Username" autocomplete="off" required />
                    <label>Required. Digits only.</label>
                </div>
                
                <!-- Form Input (ISBN) -->
                <div class="input-box">            
                    <input type="number" placeholder="ISBN" autocomplete="off" required />
                    <label>Required. Digits only.</label>
                </div>

                <input type="submit" value="Reset" class="addBook-button" />
            </div>
        </div>
    </form>

    <!-- ===================================== BOOKS TABLE ===================================== -->
    <section class="resultsSection">
        <h2>Results</h2>
        <table cellpadding="0" cellspacing="0"> 
            <tr>
                <th>Title</th>
                <th>ISBN</th>
                <th>Page Count</th>
                <th>Actions</th>
            </tr>
            <tr>
                <td>Lorem ipsum</td>
                <td>1234567890</td>
                <td>123</td>
                <td>
                    <button type="submit" class="viewButton"><ion-icon name="eye-outline"></ion-icon></button>
                </td>
            </tr>
        </table>
    </section>

    <!-- ===================================== SCRIPTS ===================================== -->
    <!-- ionicons -->
    <script type="module" src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"></script>

    <!-- Javascript header animations -->
    <script src="Javascript/nav-animations.js"></script>
</body>
</html>
