<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Author</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- ===================================== HEADER ===================================== -->
    <nav>
        <div class="logo"><h2>Hello, XXX!</h2></div>

        <ul class="links-editBook" id="links-list">
            <li><a href="searchBooks.html">Search Books</a></li>

            <li><a href="myProfile.html">My Books</a></li>
            <li class="logout-header"><a href="#">Logout</a></li>

            <div class="bar2"></div>

        </div>

    <!-- ===================================== BOOKS TABLE ===================================== -->
    <section class="viewAuthor">
        <h2>Book's from Lorem ipsum</h2>
        <table cellpadding="0" cellspacing="0"> 
            <tr>
                <th>Title</th>
                <th>ISBN</th>
                <th>Page Count</th>

            </tr>
            <tr>
                <td>Lorem ipsum</td>
                <td>1234567890</td>
                <td>123</td>
                <td>
                    <button type="submit" class="viewButton"><ion-icon name="eye-outline"></ion-icon></button>
                </td>
            </tr>
        </table>
    </section>
    <!-- ===================================== SCRIPTS ===================================== -->
    <!-- ionicons -->
    <script type="module" src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"></script>
